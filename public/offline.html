<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Offline - ARUNIWAVES</title>
<link rel="stylesheet" href="shared.css"/>
<style>
  body {
    background: var(--ink, #061120);
    color: var(--text, #f8fafc);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--sans, sans-serif);
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .offline-card {
    background: var(--card, rgba(255,255,255,0.03));
    backdrop-filter: blur(12px);
    border: 1px solid var(--border, rgba(255,255,255,0.08));
    border-radius: 20px;
    padding: 40px 24px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .offline-icon {
    font-size: 64px;
    margin-bottom: 24px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  h1 {
    font-family: var(--title-sans, var(--sans));
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 12px;
    color: var(--text);
  }
  p {
    font-size: 13px;
    color: var(--muted, #94a3b8);
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .btn-retry {
    background: var(--wave, #0077e6);
    color: #fff;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(0, 119, 230, 0.2);
  }
  .btn-retry:hover {
    background: var(--foam, #0096ff);
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <div class="offline-card">
    <span class="offline-icon">📡</span>
    <h1>Koneksi Terputus</h1>
    <p>ARUNIWAVES tidak dapat memuat halaman ini karena perangkat Anda sedang tidak terhubung ke jaringan internet.</p>
    <button class="btn-retry" onclick="window.history.back() || (window.location.href = 'index.html')">Kembali</button>
  </div>
</body>
</html>

<main>

  <div class="bbm-hero">
    <div class="bbm-content">
      <div class="bbm-eyebrow">FORMULIR PERMOHONAN</div>
      <div class="bbm-title">BBM Operasional Lapangan</div>
      <div class="bbm-sub">Silakan isi formulir di bawah ini dengan lengkap untuk mengajukan permohonan bensin/voucher BBM tugas lapangan operasional.</div>
    </div>
  </div>

  
  </div>

  <div id="section-form" class="section active">
    <div class="form-card">
      <form id="bbm-form" onsubmit="submitFormBbm(event)">
      <div class="form-grid">

      <!-- NAMA PENERIMA / PEGAWAI -->
      <div class="form-group">
        <label class="form-label" for="f-pegawai-search">Nama Penerima / Pegawai<span>*</span></label>
        <input type="text" id="f-pegawai-search" class="form-control" placeholder="Ketik nama untuk mencari..." autocomplete="off" required/>
        <input type="hidden" id="f-pegawai"/>
        <div class="autocomplete-list" id="f-pegawai-list"></div>
      </div>

      <!-- BIDANG (Auto-filled) -->
      <div class="form-group">
        <label class="form-label" for="f-bidang-display">Bidang</label>
        <input type="text" id="f-bidang-display" class="form-control" placeholder="Terisi otomatis..." readonly disabled/>
      </div>

      <!-- STOK CADANGAN CHECKBOX -->
      <div class="form-group full-width" style="display:flex;align-items:center;gap:8px;margin-bottom:12px;margin-top:8px;">
        <input type="checkbox" id="f-stok-cadangan" style="width:18px;height:18px;cursor:pointer;" onchange="toggleStokCadangan()"/>
        <label for="f-stok-cadangan" style="font-size:12px;font-weight:700;color:var(--wave);cursor:pointer;user-select:none;">Stok Cadangan / Tugas Mendadak</label>
      </div>

      <!-- TRIP FIELDS CONTAINER -->
      <div id="trip-fields-container">
        <!-- TGL KEGIATAN -->
        <div class="form-group">
          <label class="form-label" for="f-tanggal">Tanggal Kegiatan<span>*</span></label>
          <input type="date" id="f-tanggal" class="form-control" required/>
        </div>

        <!-- LOKASI TUJUAN -->
        <div class="form-group">
          <label class="form-label" for="f-lokasi">Lokasi Tujuan (Kabupaten/Kota)<span>*</span></label>
          <select id="f-lokasi" class="form-control" required>
            <option value="" disabled selected>-- Pilih Kabupaten/Kota --</option>
            <option value="Kota Denpasar">Kota Denpasar</option>
            <option value="Kabupaten Badung">Kabupaten Badung</option>
            <option value="Kabupaten Bangli">Kabupaten Bangli</option>
            <option value="Kabupaten Buleleng">Kabupaten Buleleng</option>
            <option value="Kabupaten Gianyar">Kabupaten Gianyar</option>
            <option value="Kabupaten Jembrana">Kabupaten Jembrana</option>
            <option value="Kabupaten Karangasem">Kabupaten Karangasem</option>
            <option value="Kabupaten Klungkung">Kabupaten Klungkung</option>
            <option value="Kabupaten Tabanan">Kabupaten Tabanan</option>
          </select>
        </div>

        <!-- KECAMATAN -->
        <div class="form-group">
          <label class="form-label" for="f-kecamatan">Kecamatan<span>*</span></label>
          <input type="text" id="f-kecamatan" class="form-control" placeholder="Contoh: Baturiti" required/>
        </div>

        <!-- JENIS KENDARAAN (Dinas / Pribadi) -->
        <div class="form-group">
          <label class="form-label" for="f-jenis-kendaraan">Jenis Kendaraan<span>*</span></label>
          <select id="f-jenis-kendaraan" class="form-control" onchange="onJenisKendaraanChange()" required>
            <option value="dinas">Kendaraan Dinas</option>
            <option value="pribadi">Kendaraan Pribadi</option>
          </select>
        </div>

        <!-- NOPOL KENDARAAN (Auto-populated based on Dinas/Pribadi) -->
        <div class="form-group">
          <label class="form-label" id="lbl-nopol" for="f-nopol">Nomor Polisi Kendaraan<span>*</span></label>
          <select id="f-nopol" class="form-control" required>
            <option value="" disabled selected>-- Pilih Nomor Polisi --</option>
            <option value="DK 39">DK 39</option>
            <option value="DK 420 I">DK 420 I</option>
            <option value="DK 421 I">DK 421 I</option>
            <option value="DK 1702 B">DK 1702 B</option>
            <option value="DK 423 I">DK 423 I</option>
            <option value="DK 1829 A">DK 1829 A</option>
            <option value="DK 1657 A">DK 1657 A</option>
            <option value="DK 8255 D">DK 8255 D</option>
            <option value="DK 7030 D">DK 7030 D</option>
            <option value="DK 1476 D">DK 1476 D</option>
          </select>
        </div>

        <!-- DESKRIPSI KEGIATAN -->
        <div class="form-group full-width">
          <label class="form-label" for="f-deskripsi">Deskripsi Kegiatan Operasional<span>*</span></label>
          <textarea id="f-deskripsi" class="form-control" rows="3" placeholder="Jelaskan secara rinci kegiatan dinas lapangan Anda..." required></textarea>
        </div>
      </div>

      <!-- JENIS VOUCHER -->
      <div class="form-group">
        <label class="form-label" for="f-jenis-voucher">Jenis Voucher<span>*</span></label>
        <select id="f-jenis-voucher" class="form-control" required>
          <option value="" disabled selected>-- Pilih Jenis Voucher --</option>
          <option value="5 liter">5 Liter</option>
          <option value="10 liter">10 Liter</option>
        </select>
      </div>

      <!-- JUMLAH VOUCHER -->
      <div class="form-group">
        <label class="form-label" for="f-jumlah">Jumlah Voucher (pcs)<span>*</span></label>
        <input type="number" id="f-jumlah" class="form-control" min="1" max="50" placeholder="Contoh: 4" required/>
      </div>

      </div>

      <!-- SUBMIT -->
      <button type="submit" class="btn-submit" id="btn-submit" style="margin-top:20px;">
        <span>Kirim Permohonan</span>
      </button>

      </form>
    </div>
  </div>

</main>
